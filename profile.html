<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <title>Profile - The Gold Screen</title>
    <link rel="stylesheet" href="../istyle.css">
    <style>
        .profile-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        .profile-info {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .profile-info h2 {
            color: #d4af37;
            margin-bottom: 15px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }
        .info-label {
            font-weight: bold;
            color: #333;
        }
        .info-value {
            color: #666;
        }
        .rewards-section {
            background-color: #fff;
            border: 2px solid #d4af37;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .rewards-points {
            font-size: 36px;
            color: #d4af37;
            font-weight: bold;
            margin: 10px 0;
        }
        .login-prompt {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .login-prompt a {
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid var(--red, #A3061C);
            color: var(--red, #A3061C);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            float: right;
            margin-top: -45px;
            font-weight: bold;
        }
        .logout-btn:hover {
            background: var(--red, #A3061C);
            color: white;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="../index.html">
            <img src="../assets/logo.png" alt="The Gold Screen Logo" width="80" height="auto">
        </a>
        <div class="nav-links">
            <a class="nav-link" href="../index.html#movies-scroll-target">MOVIES</a>
            <a class="nav-link" href="../shows.html">SHOWS</a>
            <a class="nav-link" href="memberships.html">MEMBERSHIPS</a>
            <a class="nav-link" href="concessions.html">CONCESSIONS</a>
        </div>
        <div class="nav-actions">
            <a class="nav-action" href="cart.html">
                <img src="../assets/cart-gold.svg" alt="Cart" width="44" height="44">
            </a>
            <a class="nav-action" href="profile.html">
                <img src="../assets/star-gold.svg" alt="Profile" width="52" height="52">
            </a>
        </div>
    </div>

    <div class="profile-container">
        <h1>My Profile</h1>
        <button class="logout-btn" onclick="logout()">Log Out</button>
        <div id="profile-content">
            <p style="text-align: center; color: #999;">Loading profile...</p>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('customerId');
            window.location.href = 'login.html';
        }

        async function loadProfile() {
            const customerId = localStorage.getItem('customerId');
            
            if (!customerId) {
                window.location.href = 'login.html';
                return;
            }
            
            const customerArray = await fetchCustomer(customerId);
            
            if (!customerArray || customerArray.length === 0) {
                document.getElementById('profile-content').innerHTML = '<p style="color:red; text-align:center;">Error loading profile.</p>';
                return;
            }

            const customer = Array.isArray(customerArray) ? customerArray[0] : customerArray;
            
            const profileContent = document.getElementById('profile-content');
            profileContent.innerHTML = `
                <div class="profile-info">
                    <h2>Account Information</h2>
                    <div class="info-row">
                        <span class="info-label">Name:</span>
                        <span class="info-value">${customer.name || 'N/A'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Email:</span>
                        <span class="info-value">${customer.email || 'N/A'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Membership Tier:</span>
                        <span class="info-value">${customer.tier_level || 'Standard'}</span>
                    </div>
                </div>
                
                <div class="rewards-section">
                    <h2>Rewards Points</h2>
                    <div class="rewards-points">${customer.reward_points || 0}</div>
                    <p>Keep watching to earn more points!</p>
                </div>

                <div class="profile-info" style="margin-top: 30px;">
                    <h2>Order History</h2>
                    <div id="order-history">
                        <p style="color: #888;">Loading orders...</p>
                    </div>
                </div>
            `;

            // Load order history
            try {
                const response = await fetch('http://localhost:3000/api/customers/' + customerId + '/orders');
                const orders = await response.json();
                const historyDiv = document.getElementById('order-history');

                if (!orders || orders.length === 0) {
                    historyDiv.innerHTML = '<p style="color: #888;">No orders yet. Start shopping!</p>';
                } else {
                    let html = '<table style="width:100%; border-collapse:collapse; margin-top:10px;">';
                    html += '<thead><tr style="border-bottom: 2px solid var(--gold, #d4af37);">';
                    html += '<th style="text-align:left; padding:10px; color:var(--gold,#d4af37);">Order #</th>';
                    html += '<th style="text-align:left; padding:10px; color:var(--gold,#d4af37);">Amount</th>';
                    html += '<th style="text-align:left; padding:10px; color:var(--gold,#d4af37);">Method</th>';
                    html += '<th style="text-align:left; padding:10px; color:var(--gold,#d4af37);">Date</th>';
                    html += '</tr></thead><tbody>';
                    
                    orders.forEach(order => {
                        const date = new Date(order.timestamp).toLocaleDateString('en-US', {
                            year: 'numeric', month: 'short', day: 'numeric',
                            hour: '2-digit', minute: '2-digit'
                        });
                        html += `<tr style="border-bottom: 1px solid #333;">
                            <td style="padding:10px;">#${order.payment_id}</td>
                            <td style="padding:10px; color:var(--gold,#d4af37); font-weight:bold;">$${Number(order.total_amount).toFixed(2)}</td>
                            <td style="padding:10px;">${order.payment_method}</td>
                            <td style="padding:10px; color:#888;">${date}</td>
                        </tr>`;
                    });
                    
                    html += '</tbody></table>';
                    historyDiv.innerHTML = html;
                }
            } catch (err) {
                document.getElementById('order-history').innerHTML = '<p style="color: #888;">Could not load order history.</p>';
            }
        }
        
        window.addEventListener('DOMContentLoaded', loadProfile);
    </script>
    <a href="admin.html" class="admin-lock" title="Admin"><img src="assets/lock.svg" alt="Admin"></a>
</body>
</html>
