<script src="api.js"></script>
<script>
    // Load movies from database
    async function loadMovies() {
        const movies = await fetchMovies();
        const moviesGrid = document.getElementById('movies-grid');
        
        movies.forEach(movie => {
            const movieBox = document.createElement('div');
            movieBox.className = 'movie-box';
            movieBox.innerHTML = `
                <div class="movie-poster">
                    <img src="assets/poster${movie.movie_id}.jpg?v=1" alt="${movie.title} Poster" width="100%" height="auto">
                </div>
                <div class="text">
                    <p class="name">${movie.title}</p>
                    <p class="details">${movie.age_rating} | ${movie.runtime}m</p>
                    <button class="book" onclick="window.location.href='shows.html?movie_id=${movie.movie_id}'">Get Tickets</button>
                </div>
            `;
            
            // Random tilt effect
            const randomTilt = (Math.random() * 4 - 2).toFixed(2);
            movieBox.style.transform = `rotate(${randomTilt}deg)`;
            const randomOffset = (Math.random() * 20 - 10).toFixed(2);
            movieBox.style.marginTop = `${randomOffset}px`;
            
            moviesGrid.appendChild(movieBox);
        });
    }
    
    // Load movies when page loads
    window.addEventListener('DOMContentLoaded', loadMovies);
</script>
