<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - The Gold Screen</title>
    <link rel="stylesheet" href="istyle.css">
    <style>
        .cart-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ccc;
            padding: 15px 0;
        }
        .cart-item p {
            margin: 5px 0;
        }
        .item-price {
            font-size: 18px;
            font-weight: bold;
            color: #d4af37;
        }
        .empty-cart {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #999;
        }
        .cart-total {
            text-align: right;
            font-size: 24px;
            font-weight: bold;
            padding: 20px 0;
            color: #d4af37;
        }
        .checkout-btn {
            float: right;
            padding: 12px 30px;
            background-color: #d4af37;
            color: #000;
            border: none;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        .checkout-btn:hover {
            background-color: #f0d566;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html">
            <img src="assets/logo.png" alt="The Gold Screen Logo" width="80" height="auto">
        </a>
        <div class="nav-links">
            <a class="nav-link" href="index.html#movies-scroll-target">MOVIES</a>
            <a class="nav-link" href="shows.html">SHOWS</a>
        </div>
        <div class="nav-actions">
            <a class="nav-action" href="cart.html">
                <img src="assets/cart-gold.svg" alt="Cart" width="44" height="44">
            </a>
            <a class="nav-action" href="profile.html">
                <img src="assets/star-gold.svg" alt="Profile" width="52" height="52">
            </a>
        </div>
    </div>

    <div class="cart-container">
        <h1>Your Cart</h1>
        <div id="pending-booking-container"></div>
        <div id="cart-items-container">
            <div class="empty-cart">Your cart is empty</div>
        </div>
        <div class="cart-total">
            Total: $<span id="cart-total">0.00</span>
        </div>
        <button class="checkout-btn">Checkout</button>
    </div>

    <script src="api.js"></script>
    <script>
        function renderPendingBooking() {
            const container = document.getElementById('pending-booking-container');
            const pending = JSON.parse(localStorage.getItem('pendingBooking') || 'null');

            if (!pending) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = `
                <div class="cart-item" style="background:#111;color:#fefcf0;border-radius:12px;padding:16px;margin-bottom:16px;">
                    <div>
                        <p><strong>Pending booking</strong></p>
                        <p>${pending.movie_title}</p>
                        <p>${pending.date} | ${pending.time} | Room ${pending.room}</p>
                        <p>Seats: ${(pending.seats || []).join(', ') || 'None selected'}</p>
                        <p>Tickets: ${pending.ticketCount || 1}</p>
                    </div>
                    <div>
                        <button class="checkout-btn" onclick="addPendingBookingToCart()">Add to Cart</button>
                    </div>
                </div>
            `;
        }

        function addPendingBookingToCart() {
            const pending = JSON.parse(localStorage.getItem('pendingBooking') || 'null');
            if (!pending) return;

            const cart = getCartFromStorage();
            cart.push({
                id: pending.showtime_id || `${pending.movie_id}-${pending.date}-${pending.time}-${pending.room}`,
                name: `${pending.movie_title} (${pending.date} ${pending.time})`,
                price: 12.5,
                quantity: Number(pending.ticketCount || 1),
                seats: pending.seats || [],
                room: pending.room
            });
            saveCartToStorage(cart);
            localStorage.removeItem('pendingBooking');
            displayCart();
            renderPendingBooking();
        }

        // Display cart items
        function displayCart() {
            const cart = getCartFromStorage();
            const container = document.getElementById('cart-items-container');
            
            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
                return;
            }
            
            let total = 0;
            let html = '';
            
            cart.forEach((item, index) => {
                const itemTotal = (item.price * item.quantity).toFixed(2);
                total += parseFloat(itemTotal);
                
                html += `
                    <div class="cart-item">
                        <div>
                            <p><strong>${item.name}</strong></p>
                            <p>Quantity: ${item.quantity}</p>
                        </div>
                        <div>
                            <p class="item-price">$${itemTotal}</p>
                            <button onclick="removeFromCart(${index})" style="color: red; cursor: pointer;">Remove</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            document.getElementById('cart-total').textContent = total.toFixed(2);
        }
        
        function removeFromCart(index) {
            const cart = getCartFromStorage();
            cart.splice(index, 1);
            saveCartToStorage(cart);
            displayCart();
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            renderPendingBooking();
            displayCart();
        });
    </script>
</body>
</html>
