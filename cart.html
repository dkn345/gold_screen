<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="istyle.css">
    <style>
        .cart-container {
            max-width: 900px;
            margin: 40px auto;
            margin-top: 80px;
            padding: 20px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10px;
            border-bottom: 1px solid var(--black);
            margin: 12px 0;
            font-family: 'TitleFont';
        }
        .cart-item p {
            margin: 5px 0;
        }
        .item-price {
            font-size: 22px;
            font-weight: bold;
            color: var(--gold);
        }
        .empty-cart {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #999;
        }
        .cart-total {
            text-align: right;
            font-size: 24px;
            font-weight: bold;
            padding: 20px 0;
            color: var(--gold);
        }
        .checkout-btn {
            padding: 10px 20px;
            color: var(--gold);
            border: var(--gold) 2px solid;
            background: transparent;
            font-family: 'TitleFont', Georgia, serif;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }
        .checkout-btn:hover {
            background-color: var(--gold, #d4af37);
            color: black;
        }
        .remove-btn {
            color: var(--red, #A3061C);
            background: transparent;
            border: 1px solid var(--red, #A3061C);
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: background 0.2s, color 0.2s;
            font-family: 'TitleFont';
        }
        .remove-btn:hover {
            background: var(--red, #A3061C);
            color: white;
        }
        .discount-row {
            color: var(--gold, #d4af37);
            font-weight: bold;
        }
        #cart-total-container {
            margin-top: 10px;
            font-size: 1.5rem;
            color: var(--gold);
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html">
            <img src="assets/logo.png" alt="The Gold Screen Logo" width="80" height="auto">
        </a>
        <div class="nav-links">
            <a class="nav-link" href="index.html#movies-scroll-target">MOVIES</a>
            <a class="nav-link" href="shows.html">SHOWS</a>
            <a class="nav-link" href="memberships.html">MEMBERSHIPS</a>
            <a class="nav-link" href="concessions.html">CONCESSIONS</a>
        </div>
        <div class="nav-actions">
            <a class="nav-action" href="cart.html">
                <img src="assets/cart-gold.svg" alt="Cart" width="44" height="44">
            </a>
            <a class="nav-action" href="profile.html">
                <img src="assets/star-gold.svg" alt="Profile" width="52" height="52">
            </a>
        </div>
    </div>

    <div class="cart-container">
        <h1 style="font-size: 60px;">Cart</h1>
        <div id="pending-booking-container"></div>
        <div id="cart-items-container">
            <div class="empty-cart">Your cart is empty</div>
        </div>
        <div class="cart-total" style="text-align: right; padding-top: 20px; margin-top: 10px;">
            <div id="subtotal-row" style="font-size: 1.1rem; margin-bottom: 12px; color: var(--black);">
                Subtotal: <span id="cart-subtotal-label">$<span id="cart-subtotal">0.00</span></span>
            </div>
            <div id="discount-row" style="display: none; margin-bottom: 12px; background: linear-gradient(135deg, #8B6914, #b8860b); color: #fff; padding: 12px 18px; border-radius: 8px; text-align: left;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span>🎟️ <strong>Member Discount (<span id="discount-pct">0</span>%)</strong></span>
                    <span style="font-size: 1.2rem; font-weight: bold;">-$<span id="discount-amount">0.00</span></span>
                </div>
                <div style="font-size: 0.8rem; margin-top: 4px; opacity: 0.8;">Applied automatically from your membership</div>
            </div>
            <div id="total-row" style="font-size: 1.6rem; color: var(--gold); font-weight: bold; margin-top: 8px; font-family: 'TitleFont';">
                Total: $<span id="cart-total">0.00</span>
            </div>
            <div id="savings-row" style="display: none; font-size: 0.9rem; color: #d4af37; margin-top: 6px; font-weight: bold;">
                You're saving $<span id="savings-amount">0.00</span> with your membership! 🎉
            </div>
        </div>
        <div style="text-align: right; margin-top: 10px;">
            <button class="checkout-btn" id="main-checkout-btn">Checkout</button>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        function renderPendingBooking() {
            const container = document.getElementById('pending-booking-container');
            const pending = JSON.parse(localStorage.getItem('pendingBooking') || 'null');

            if (!pending) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = `
                <div class="cart-item" style="background:#111;color:#fefcf0;border-radius:12px;padding:16px;margin-bottom:16px;">
                    <div>
                        <p><strong>Pending booking</strong></p>
                        <p>${pending.movie_title}</p>
                        <p>${pending.date} | ${pending.time} | Room ${pending.room}</p>
                        <p>Seats: ${(pending.seats || []).join(', ') || 'None selected'}</p>
                        <p>Tickets: ${pending.ticketCount || 1}</p>
                    </div>
                    <div>
                        <button class="checkout-btn" onclick="addPendingBookingToCart()">Add to Cart</button>
                    </div>
                </div>
            `;
        }

        function addPendingBookingToCart() {
            const pending = JSON.parse(localStorage.getItem('pendingBooking') || 'null');
            if (!pending) return;

            const cart = getCartFromStorage();
            cart.push({
                id: pending.showtime_id || `${pending.movie_id}-${pending.date}-${pending.time}-${pending.room}`,
                name: `${pending.movie_title} (${pending.date} ${pending.time})`,
                price: 12.5,
                quantity: Number(pending.ticketCount || 1),
                seats: pending.seats || [],
                room: pending.room
            });
            saveCartToStorage(cart);
            localStorage.removeItem('pendingBooking');
            displayCart();
            renderPendingBooking();
        }

        // Display cart items
        async function displayCart() {
            const cart = getCartFromStorage();
            const container = document.getElementById('cart-items-container');
            
            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
                if (document.getElementById('cart-subtotal')) document.getElementById('cart-subtotal').textContent = '0.00';
                document.getElementById('cart-total').textContent = '0.00';
                if (document.getElementById('discount-row')) document.getElementById('discount-row').style.display = 'none';
                return;
            }
            
            let total = 0;
            let html = '';
            
            cart.forEach((item, index) => {
                const itemTotal = (item.price * item.quantity).toFixed(2);
                total += parseFloat(itemTotal);
                
                html += `
                    <div class="cart-item">
                        <div>
                            <p><strong>${item.name}</strong></p>
                            <p style="font-size: 0.8rem;">Quantity: ${item.quantity}</p>
                        </div>
                        <div>
                            <p class="item-price">$${itemTotal}</p>
                            <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            if (document.getElementById('cart-subtotal')) {
                document.getElementById('cart-subtotal').textContent = total.toFixed(2);
            }

            let finalTotal = total;
            const customerId = localStorage.getItem('customerId');
            
            if (customerId) {
                const customerArray = await fetchCustomer(customerId);
                const customer = Array.isArray(customerArray) ? customerArray[0] : customerArray;
                
                if (customer && customer.discount_pct) {
                    const discountAmount = total * (customer.discount_pct / 100);
                    finalTotal = total - discountAmount;
                    
                    // Show discount banner
                    document.getElementById('discount-pct').textContent = customer.discount_pct;
                    document.getElementById('discount-amount').textContent = discountAmount.toFixed(2);
                    document.getElementById('discount-row').style.display = 'block';
                    
                    // Strikethrough on subtotal
                    document.getElementById('cart-subtotal-label').style.textDecoration = 'line-through';
                    document.getElementById('cart-subtotal-label').style.color = '#999';
                    
                    // Show savings celebration
                    document.getElementById('savings-amount').textContent = discountAmount.toFixed(2);
                    document.getElementById('savings-row').style.display = 'block';
                } else {
                    document.getElementById('discount-row').style.display = 'none';
                    document.getElementById('savings-row').style.display = 'none';
                    document.getElementById('cart-subtotal-label').style.textDecoration = 'none';
                }
            } else {
                document.getElementById('discount-row').style.display = 'none';
                document.getElementById('savings-row').style.display = 'none';
                if (document.getElementById('cart-subtotal-label')) document.getElementById('cart-subtotal-label').style.textDecoration = 'none';
            }
            
            document.getElementById('cart-total').textContent = finalTotal.toFixed(2);
        }
        
        function removeFromCart(index) {
            const cart = getCartFromStorage();
            cart.splice(index, 1);
            saveCartToStorage(cart);
            displayCart();
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            renderPendingBooking();
            displayCart();
            
            document.getElementById('main-checkout-btn').addEventListener('click', () => {
                const cart = getCartFromStorage();
                if (cart.length === 0) {
                    alert('Your cart is empty!');
                    return;
                }
                
                window.location.href = 'checkout.html';
            });
        });
    </script>
    <a href="admin.html" class="admin-lock" title="Admin"><img src="assets/lock.svg" alt="Admin"></a>
</body>
</html>
