<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <title>Checkout Successful - The Gold Screen</title>
    <link rel="stylesheet" href="istyle.css">
    <style>
        .success-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            padding: 40px;
            background: #111;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .success-icon {
            font-size: 64px;
            color: #d4af37;
            margin-bottom: 20px;
        }
        .success-title {
            color: #d4af37;
            margin-bottom: 15px;
            font-family: 'TitleFont', sans-serif;
        }
        .success-message {
            color: #fefcf0;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .home-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #d4af37;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        .home-btn:hover {
            background-color: #f0d566;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html">
            <img src="assets/logo.png" alt="The Gold Screen Logo" width="80" height="auto">
        </a>
        <div class="nav-links">
            <a class="nav-link" href="index.html#movies-scroll-target">MOVIES</a>
            <a class="nav-link" href="shows.html">SHOWS</a>
            <a class="nav-link" href="memberships.html">MEMBERSHIPS</a>
            <a class="nav-link" href="concessions.html">CONCESSIONS</a>
        </div>
        <div class="nav-actions">
            <a class="nav-action" href="cart.html">
                <img src="assets/cart-gold.svg" alt="Cart" width="44" height="44">
            </a>
            <a class="nav-action" href="profile.html">
                <img src="assets/star-gold.svg" alt="Profile" width="52" height="52">
            </a>
        </div>
    </div>

    <div class="success-container">
        <div class="success-icon">✓</div>
        <h1 class="success-title">Order Confirmed!</h1>
        <p class="success-message">
            Thank you for your purchase! Your payment has been processed successfully.
        </p>
        
        <div id="order-details" style="text-align: left; background: #1a1a1a; border-radius: 8px; padding: 20px; margin: 25px 0; border: 1px solid #2a2a2a;">
            <h3 style="margin-top: 0; color: #d4af37;">Order Details</h3>
            <div id="order-items" style="color: #ccc;"></div>
        </div>

        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
            <a href="index.html" class="home-btn">Return to Home</a>
            <a href="profile.html" class="home-btn" style="background: transparent; border: 2px solid #d4af37; color: #d4af37;">View Profile</a>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const order = JSON.parse(localStorage.getItem('lastOrder') || 'null');
            const detailsDiv = document.getElementById('order-items');
            
            if (!order || !order.items || order.items.length === 0) {
                detailsDiv.innerHTML = '<p style="color: #888;">No order details available.</p>';
                return;
            }

            let html = '';
            
            order.items.forEach(item => {
                const itemTotal = (item.price * item.quantity).toFixed(2);
                html += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #2a2a2a;">
                    <span>${item.name} × ${item.quantity}</span>
                    <span style="color:#d4af37;">$${itemTotal}</span>
                </div>`;
            });

            html += `<div style="display:flex; justify-content:space-between; padding:10px 0; margin-top:5px; color:#888;">
                <span>Subtotal</span>
                <span>$${order.subtotal}</span>
            </div>`;

            if (order.pointsDiscount) {
                html += `<div style="display:flex; justify-content:space-between; padding:8px 0; color:#d4af37;">
                    <span>🌟 Points Discount</span>
                    <span>-$${order.pointsDiscount}</span>
                </div>`;
            }

            if (order.discountPct) {
                const discountAmt = order.memberDiscountAmt || (parseFloat(order.subtotal) - parseFloat(order.total) - (order.pointsDiscount ? parseFloat(order.pointsDiscount) : 0)).toFixed(2);
                html += `<div style="display:flex; justify-content:space-between; padding:8px 0; color:#d4af37;">
                    <span>🎟️ Member Discount (${order.discountPct}%)</span>
                    <span>-$${discountAmt}</span>
                </div>`;
            }

            html += `<div style="display:flex; justify-content:space-between; padding:12px 0; margin-top:5px; font-size:1.3rem; font-weight:bold; border-top:2px solid #d4af37; color:#d4af37;">
                <span>Total Paid</span>
                <span>$${order.total}</span>
            </div>`;

            detailsDiv.innerHTML = html;
            
            // Clean up
            localStorage.removeItem('lastOrder');
        });
    </script>
    <a href="admin.html" class="admin-lock" title="Admin"><img src="assets/lock.svg" alt="Admin"></a>
</body>
</html>
