    <!-- now for the scroll date thing -->
     <div class ="scroll-date-container">
        <button class="scroll-arrow" id="leftButton">&#8249;</button>
        <div class = "scroller" id="dateScroller">
            <!-- Date buttons are generated by JavaScript -->
        </div>
        <button class="scroll-arrow" id="rightButton">&#8250;</button>
    </div>
    
    <!-- showing card -->
    <div id="shows-container">
        <p id="shows-status" class="shows-status">Loading shows...</p>
    </div>






    <!-- JAVASCRIPT! -->
    <script src="api.js?v=4"></script>
    <script>
        const showsContainer = document.getElementById('shows-container');
        const selectedDateState = {
            value: new Date().toISOString().slice(0, 10)
        };

        function formatDateButton(dateString) {
            const date = new Date(`${dateString}T00:00:00`);
            const weekday = date.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
            const month = date.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
            const day = date.getDate();
            return { weekday, label: `${month} ${day}` };
        }

        function renderDateButtons(dateList) {
            const dateScroller = document.getElementById('dateScroller');
            const buttons = [];
            for (const dateString of dateList) {
                const { weekday, label } = formatDateButton(dateString);
                const activeClass = dateString === selectedDateState.value ? ' active' : '';
                buttons.push(`
                    <button class="date-item${activeClass}" data-date="${dateString}">
                        <span class="date-text">${weekday}</span>
                        <span class="date-text">${label}</span>
                    </button>
                `);
            }
            dateScroller.innerHTML = buttons.join('');
        }

        function updateActiveDateButton() {
            const dateScroller = document.getElementById('dateScroller');
            dateScroller.querySelectorAll('.date-item').forEach((button) => {
                if (button.dataset.date === selectedDateState.value) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function formatShowtime(timeString) {
            const [hourText, minuteText] = String(timeString).split(':');
            const hour = Number(hourText);
            const suffix = hour >= 12 ? 'PM' : 'AM';
            const displayHour = ((hour + 11) % 12 + 1).toString();
            return `${displayHour}:${minuteText || '00'} ${suffix}`;
        }

        function formatRuntime(minutes) {
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return `${hours}h ${mins}m`;
        }

        async function loadShows(selectedDate) {
            const allShows = await fetchShows();
            
            const urlParams = new URLSearchParams(window.location.search);
            const targetMovieId = urlParams.get('movie_id');
            
            const shows = targetMovieId 
                ? allShows.filter(s => String(s.movie_id) === String(targetMovieId))
                : allShows;

            if (!shows.length) {
                showsContainer.innerHTML = '<p class="shows-status">No shows available</p>';
                return;
            }

            const showCards = await Promise.all(shows.map(async (show) => {
                const showtimes = await fetchShowtimes(show.movie_id, selectedDate);
                const showtimesHTML = (() => {
                    if (!showtimes.length) {
                        return '<p class="shows-status">No showtimes for this date.</p>';
                    }

                    return showtimes
                        .slice()
                        .sort((a, b) => {
                            const timeCompare = String(a.start_time).localeCompare(String(b.start_time));
                            return timeCompare !== 0 ? timeCompare : Number(a.room_number) - Number(b.room_number);
                        })
                        .map((showtime) => {
                            const params = new URLSearchParams({
                                movie_id: show.movie_id,
                                movie_title: show.title,
                                date: selectedDate,
                                time: String(showtime.start_time),
                                room: String(showtime.room_number),
                                showtime_id: String(showtime.showtime_id),
                                cb: Date.now().toString()
                            });
                            return `<button type="button" class="showtime" data-href="seat_selection.html?${params.toString()}">${formatShowtime(showtime.start_time)} | Room ${showtime.room_number}</button>`;
                        })
                        .join('');
                })();

                return `
                    <article class="show-card">
                        <img src="assets/poster${show.movie_id}.jpg?v=1" alt="${show.title} Poster" class="show-poster">
                        <div class="schedule-panel">
                            <div class="movie-info">
                                <h2 class="title">${show.title}</h2>
                                <div class="movie-meta-row">
                                    <p class="movie-meta">${show.age_rating} | ${formatRuntime(show.runtime)}</p>
                                    <span class="movie-genre">${show.genre.toLowerCase()}</span>
                                </div>                        
                            </div>
                            <div class="showtimes">
                                ${showtimesHTML}
                            </div>
                        </div>
                    </article>
                `;
            }));

            showsContainer.innerHTML = showCards.join('');
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetchShowDates().then((dates) => {
                const dateList = dates.length ? dates : [new Date().toISOString().slice(0, 10)];
                if (!dateList.includes(selectedDateState.value)) {
                    selectedDateState.value = dateList[0];
                }
                renderDateButtons(dateList);
                updateActiveDateButton();
                loadShows(selectedDateState.value);
            });
        });

        const scroller = document.getElementById('dateScroller');
        const leftArrow = document.getElementById('leftButton');
        const rightArrow = document.getElementById('rightButton');

        function scrollLeft() {
            // Scrolls left by 60% of the visible width
            const distance = Math.round(scroller.clientWidth * 0.3);
            console.log('Scrolling left. Current scrollLeft:', scroller.scrollLeft, 'Distance:', distance);
            scroller.scrollBy({ left: -distance, behavior: 'smooth' });
        }

        function scrollRight() {
            // Scrolls right by 60% of the visible width
            const distance = Math.round(scroller.clientWidth * 0.3);
            console.log('Scrolling right. Current scrollLeft:', scroller.scrollLeft, 'Distance:', distance);
            scroller.scrollBy({ left: distance, behavior: 'smooth' });
        }

        function updateArrowVisibility() {
        const scrollLeft = scroller.scrollLeft;
        const maxScroll = scroller.scrollWidth - scroller.clientWidth;

        // Toggle Left Arrow: Show if we've scrolled more than 5px
        if (scrollLeft > 5) {
            leftArrow.classList.add('is-visible');
        } else {
            leftArrow.classList.remove('is-visible');
        }

        // Toggle Right Arrow: Show if we aren't at the very end
        // We use -5 as a "buffer" for sub-pixel rounding
        if (scrollLeft < maxScroll - 5) {
            rightArrow.classList.add('is-visible');
        } else {
            rightArrow.classList.remove('is-visible');
        }
    }

        // Attach click listeners
        leftArrow.addEventListener('click', scrollLeft);
        rightArrow.addEventListener('click', scrollRight);
        scroller.addEventListener('click', (event) => {
            const button = event.target.closest('.date-item');
            if (!button) return;
            selectedDateState.value = button.dataset.date;
            updateActiveDateButton();
            loadShows(selectedDateState.value);
        });

        showsContainer.addEventListener('click', (event) => {
            const showtimeButton = event.target.closest('.showtime');
            if (!showtimeButton) return;
            const href = showtimeButton.dataset.href;
            if (href) {
                window.location.href = href;
            }
        });

        // 1. Run it immediately so the Right arrow shows up on page load
        updateArrowVisibility();

        // 2. Run it every time the user scrolls
        scroller.addEventListener('scroll', updateArrowVisibility);
    </script>
    <a href="admin.html" class="admin-lock" title="Admin"><img src="assets/lock.svg" alt="Admin"></a>
</body>
</html>
